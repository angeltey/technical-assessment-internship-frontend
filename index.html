<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyFirstTry Portfolio</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark navbar-expand-lg">
    <div class="container">

        <a class="navbar-brand fw-bold" href="#">MyFirstTry</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <div class="ms-auto d-flex flex-column flex-lg-row gap-3">
                <a class="nav-link text-white" href="#" id="homeBtn">Home</a>
                <a class="nav-link text-white" href="#" id="aboutBtn">About</a>
                <a class="nav-link text-white" href="https://wa.me/60107782181" target="_blank">Contact Me </a>
            </div>
        </div>

    </div>
</nav>

<!-- MODAL -->
<div class="modal fade" id="mainModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle"></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>
</div>

<!-- BOOTSTRAP JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
const modal = new bootstrap.Modal(document.getElementById('mainModal'));
const title = document.getElementById('modalTitle');
const body = document.getElementById('modalBody');

document.getElementById('homeBtn').addEventListener('click', function(e) {
    e.preventDefault();

    title.innerText = "Welcome";

    body.innerHTML = `
        <h5>Hi, I'm Angel Tey Tian Xin 👋</h5>
        <p>A student seeking internship in IT / Web Development</p>
        <p>I enjoy building simple web applications using HTML, CSS, Bootstrap.</p>
        <p>I focus on clean and simple UI design.</p>
    `;

    modal.show();
});

document.getElementById('aboutBtn').addEventListener('click', function(e) {
    e.preventDefault();

    title.innerText = "About Me";

    body.innerHTML = `
        <p><strong>Studying:</strong> Diploma in IT / Computer Science</p>
        <p><strong>Languages:</strong> C++, Java, VB.NET</p>
        <p><strong>Web:</strong> HTML, CSS, JavaScript, PHP</p>
        <p><strong>Adobe:</strong> Adobe Photoshop</p>
        <p><strong>Strength:</strong> Fast learner, teamwork</p>
    `;

    modal.show();
});
</script>

<!-- FOOTER -->
<footer class="mt-auto bg-dark text-white text-center py-3">
    <div class="container">
        <small>© 2026 MyFirstTry. All rights reserved.</small>
    </div>
</footer>

</body>
</html>
